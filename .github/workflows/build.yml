name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write   # needed for tag → release upload

jobs:
  build:
    name: macOS arm64
    runs-on: macos-15
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install OBS Studio (provides libobs)
        run: |
          brew update
          brew install --cask obs
          test -f "/Applications/OBS.app/Contents/Frameworks/libobs.framework/Versions/A/libobs"

      - name: Install build tools
        run: brew install ninja

      - name: Configure
        run: cmake -G Ninja -B build

      - name: Build
        run: cmake --build build

      - name: Verify bundle
        run: |
          test -d "build/obs-syphon-server.plugin"
          file "build/obs-syphon-server.plugin/Contents/MacOS/obs-syphon-server"

      - name: Package
        id: pkg
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(awk -F'[ )]' '/project\(/{for(i=1;i<=NF;i++) if($i=="VERSION") print $(i+1)}' CMakeLists.txt)
            VERSION="${VERSION}+$(git rev-parse --short HEAD)"
          fi
          NAME="obs-syphon-server-${VERSION}-macos-arm64"
          mkdir -p dist
          ditto -c -k --keepParent "build/obs-syphon-server.plugin" "dist/${NAME}.zip"
          shasum -a 256 "dist/${NAME}.zip" | tee "dist/${NAME}.zip.sha256"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: dist/*

      - name: Create release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            macOS arm64 build of obs-syphon-server ${{ steps.pkg.outputs.version }}.

            **Install:**
            ```sh
            unzip ${{ steps.pkg.outputs.name }}.zip
            xattr -dr com.apple.quarantine obs-syphon-server.plugin
            mv obs-syphon-server.plugin ~/Library/Application\ Support/obs-studio/plugins/
            ```
            Then restart OBS Studio.
